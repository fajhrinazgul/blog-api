info:
  name: Comment List
  type: http
  seq: 1

http:
  method: POST
  url: http://localhost:8000/api/posts/:slug/comments/
  params:
    - name: slug
      value: belajar-bahasa-pemrograman-golang
      type: path
  body:
    type: json
    data: |-
      {
        "title": "Informasi yang sangat luar biasa",
        "content": "Saya sangat suka?"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
